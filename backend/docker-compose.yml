services:
  postgres:
    image: postgres:16-alpine
    container_name: redup-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: redup
      POSTGRES_PASSWORD: redup
      POSTGRES_DB: redup
    ports:
      - "5432:5432"
    volumes:
      - redup_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: redup-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redup_redisdata:/data

volumes:
  redup_pgdata:
  redup_redisdata:
